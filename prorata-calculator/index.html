<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro-Rata Calculator by FY and Month</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --primary-color: #007acc;
      --primary-hover: #cce8ff;
      --bg-color: #f0f2f5;
      --text-color: #1a1a1a;
      --card-bg: #fff;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 0;
      padding: clamp(16px, 4vw, 40px) clamp(12px, 3vw, 24px);
      background: var(--bg-color);
      color: var(--text-color);
      line-height: 1.5;
    }

    .container {
      max-width: 1050px;
      margin: 0 auto;
    }

    h2 {
      font-size: clamp(20px, 5vw, 24px);
      font-weight: 600;
      color: var(--primary-color);
      margin: 0 0 6px;
    }

    .subtitle {
      font-size: clamp(11px, 2.5vw, 13px);
      color: #666;
      margin: 0 0 24px;
    }

    .kbd-hint {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      background: rgba(0,90,153,0.12);
      color: #005a99;
      border: 1px solid rgba(0,90,153,0.25);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 4px;
      letter-spacing: 0.3px;
      vertical-align: middle;
      font-family: 'Roboto Mono', monospace;
    }

    .input-card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      padding: clamp(16px, 4vw, 24px);
      margin-bottom: 24px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Roboto', Arial, sans-serif;
      min-height: 44px; /* Mobile Friendly Touch Target */
    }

    .field input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(0,122,204,0.15);
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      width: 100%;
      min-height: 44px; /* Mobile Friendly Touch Target */
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover { background: #f5f5f5; }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: #e6f4ff;
      border-color: var(--primary-color);
      color: #005a99;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .btn-download {
      background: #f0faf4;
      border-color: #28a745;
      color: #1a7a35;
    }
    .btn-download:hover { background: #d4f0de; }

    .btn-danger {
      background: #fff5f5;
      border-color: #e53e3e;
      color: #c53030;
    }
    .btn-danger:hover { background: #ffe0e0; }

    /* Summary metric cards responsive layouts */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: #f7f9fc;
      border-radius: 8px;
      padding: 14px 16px;
      border: 1px solid #e8edf2;
    }

    .metric-card .lbl {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .metric-card .val {
      font-size: clamp(15px, 4vw, 18px);
      font-weight: 600;
      color: var(--text-color);
      word-break: break-word;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary-color);
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Overflow containers keep tables readable on ultra-narrow phones */
    .table-container {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      background: var(--card-bg);
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px; /* Scaled down for better desktop/mobile default */
      text-align: left;
    }

    thead th {
      background: #eaf4ff;
      color: #444;
      font-weight: 600;
      padding: 12px;
      border-bottom: 1px solid #d0e8f8;
      white-space: nowrap;
    }

    tbody td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      color: var(--text-color);
      white-space: nowrap; /* Prevents awkward mid-text line breaks on mobile */
    }

    /* Exceptions allowing multi-line layout inside wide columns */
    tbody td:last-child {
      white-space: normal;
      min-width: 180px;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr.row-current td { background: #f0faf4; }
    tbody tr.row-prior   td { background: #fffbf0; }
    tbody tr.row-future  td { background: #f0f5ff; }
    tbody tr:hover td { background: #f7f9fc; }
    tbody tr.row-current:hover td { background: #e6f7ee; }

    tbody tr:focus {
      outline: 2px solid var(--primary-color);
      outline-offset: -2px;
    }
    tbody tr:focus td { background: #ddeeff; }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-current { background: #d4edda; color: #1a7a35; }
    .badge-prior   { background: #fff3cd; color: #856404; }
    .badge-future  { background: #cce5ff; color: #004085; }

    .error-msg {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .skip-link {
      position: absolute;
      left: -9999px;
      top: 8px;
      background: var(--primary-color);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      z-index: 100;
    }
    .skip-link:focus { left: 16px; }

    @media (max-width: 480px) {
      .btn-row {
        grid-template-columns: 1fr;
      }
      .kbd-hint {
        display: none; /* Hide non-actionable shortcuts on touch devices */
      }
    }
  </style>
</head>
<body>

<a href="#result" class="skip-link">Skip to results</a>

<div class="container">
  <h2>&#8377; Prorated Amount — FY &amp; Month Breakdown</h2>
  <p class="subtitle">Use Tab to move between fields &bull; Arrow keys to adjust dates &bull; Enter to activate buttons &bull; Ctrl+Enter to calculate</p>

  <div class="input-card" role="form" aria-label="Prorata calculator inputs">
    <div class="grid2">
      <div class="field">
        <label for="startDate">Start date</label>
        <input type="date" id="startDate" tabindex="1" aria-label="Start date" aria-required="true" aria-describedby="hint-dates">
      </div>
      <div class="field">
        <label for="endDate">End date</label>
        <input type="date" id="endDate" tabindex="2" aria-label="End date" aria-required="true" aria-describedby="hint-dates">
      </div>
    </div>
    <p id="hint-dates" style="font-size:12px;color:#999;margin:0 0 12px;">Use arrow keys to change date values once a date field is focused.</p>

    <div class="field">
      <label for="totalAmount">Total amount (&#8377;)</label>
      <input type="number" id="totalAmount" placeholder="e.g. 120000" min="0" tabindex="3" aria-label="Total amount in rupees" aria-required="true">
    </div>

    <div class="btn-row" role="group" aria-label="Actions">
      <button class="btn btn-primary" id="btnCalculate" onclick="calculateProrata()" tabindex="4" aria-label="Calculate prorated amount. Keyboard shortcut: Ctrl+Enter">
        &#9654; Calculate <span class="kbd-hint" aria-hidden="true">Ctrl+Enter</span>
      </button>
      <button class="btn btn-download" id="btnDownload" onclick="downloadCSV()" tabindex="5" aria-label="Download results as CSV file">
        &#8595; Download CSV
      </button>
      <button class="btn btn-danger" id="btnClear" onclick="clearAll()" tabindex="6" aria-label="Clear all inputs and results">
        &#10005; Clear
      </button>
    </div>
  </div>

  <div id="result" tabindex="-1" aria-live="polite" aria-label="Calculation results"></div>
</div>

<script>
  const FY_START_MONTH = 4;
  let csvRows = [];
  const NAV_IDS = ['startDate', 'endDate', 'totalAmount', 'btnCalculate', 'btnDownload', 'btnClear'];

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.ctrlKey) {
      e.preventDefault();
      calculateProrata();
    }
  });

  document.querySelectorAll('.field input').forEach(function (input) {
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.ctrlKey) {
        e.preventDefault();
        const idx = NAV_IDS.indexOf(input.id);
        const next = document.getElementById(NAV_IDS[idx + 1]);
        if (next) next.focus();
      }
    });
  });

  document.getElementById('totalAmount').addEventListener('keydown', function (e) {
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      this.value = (parseFloat(this.value) || 0) + 1000;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const v = (parseFloat(this.value) || 0) - 1000;
      this.value = v < 0 ? 0 : v;
    }
  });

  document.querySelectorAll('.btn').forEach(function (btn) {
    btn.addEventListener('keydown', function (e) {
      const btns = Array.from(document.querySelectorAll('.btn'));
      const idx  = btns.indexOf(btn);
      if (e.key === 'ArrowRight' && idx < btns.length - 1) {
        e.preventDefault();
        btns[idx + 1].focus();
      }
      if (e.key === 'ArrowLeft' && idx > 0) {
        e.preventDefault();
        btns[idx - 1].focus();
      }
    });
  });

  document.addEventListener('keydown', function (e) {
    const active = document.activeElement;
    if (!active || active.tagName !== 'TR') return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = active.nextElementSibling;
      if (next && next.tagName === 'TR') next.focus();
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = active.previousElementSibling;
      if (prev && prev.tagName === 'TR') prev.focus();
    }
  });

  function getFYStartYear(date) {
    return (date.getMonth() + 1 >= FY_START_MONTH) ? date.getFullYear() : date.getFullYear() - 1;
  }

  function fyLabel(yr) {
    return 'FY ' + yr + '-' + (yr + 1).toString().slice(-2);
  }

  function fmtINR(n) {
    return '\u20B9' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function escapeCsv(val) {
    const s = String(val);
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }

  function clearAll() {
    document.getElementById('startDate').value   = '';
    document.getElementById('endDate').value     = '';
    document.getElementById('totalAmount').value = '';
    document.getElementById('result').innerHTML  = '';
    csvRows = [];
    document.getElementById('startDate').focus();
  }

  function calculateProrata() {
    const startInput  = document.getElementById('startDate').value;
    const endInput    = document.getElementById('endDate').value;
    const totalAmount = parseFloat(document.getElementById('totalAmount').value);
    const resultDiv   = document.getElementById('result');
    csvRows = [];

    if (!startInput || !endInput || isNaN(totalAmount) || totalAmount < 0) {
      resultDiv.innerHTML = '<div class="error-msg" role="alert">&#9888; Please enter valid start/end dates and a non-negative total amount.</div>';
      resultDiv.focus();
      return;
    }

    const startDate = new Date(startInput);
    const endDate   = new Date(endInput);

    if (endDate < startDate) {
      resultDiv.innerHTML = '<div class="error-msg" role="alert">&#9888; End date must be after start date.</div>';
      resultDiv.focus();
      return;
    }

    const MS_PER_DAY  = 86400000;
    const totalDays   = Math.floor((endDate - startDate) / MS_PER_DAY) + 1;
    const oneDayAmt   = totalAmount / totalDays;
    const currentFYSY = getFYStartYear(new Date());

    csvRows.push(['Summary', 'Value']);
    csvRows.push(['Total Duration (days)', totalDays]);
    csvRows.push(['Total Amount (INR)', totalAmount.toFixed(2)]);
    csvRows.push(['Per Day Amount (INR)', oneDayAmt.toFixed(2)]);
    csvRows.push([]);

    let output = '';

    output += `
    <div class="metrics-grid" role="region" aria-label="Summary metrics">
      <div class="metric-card"><div class="lbl">Total days</div><div class="val">${totalDays}</div></div>
      <div class="metric-card"><div class="lbl">Total amount</div><div class="val">${fmtINR(totalAmount)}</div></div>
      <div class="metric-card"><div class="lbl">Per day</div><div class="val">${fmtINR(oneDayAmt)}</div></div>
      <div class="metric-card"><div class="lbl">Current FY</div><div class="val">${fyLabel(currentFYSY)}</div></div>
    </div>`;

    const fyRows  = [];
    let fyCursor  = getFYStartYear(startDate);
    let safeGuard = 0;

    while (safeGuard++ < 100) {
      const fyStart  = new Date(fyCursor + '-04-01');
      const fyEnd    = new Date((fyCursor + 1) + '-03-31');
      const actStart = startDate > fyStart ? startDate : fyStart;
      const actEnd   = endDate   < fyEnd   ? endDate   : fyEnd;

      if (actStart <= actEnd) {
        const days = Math.floor((actEnd - actStart) / MS_PER_DAY) + 1;
        const amt  = days * oneDayAmt;
        const type = fyCursor < currentFYSY  ? 'prior' : fyCursor === currentFYSY ? 'current' : 'future';
        fyRows.push({ yr: fyCursor, label: fyLabel(fyCursor), days, amt, type });
      }
      if (fyEnd >= endDate) break;
      fyCursor++;
    }

    const priorTotal = fyRows.filter(r=>r.type==='prior').reduce((a,b)=>a+b.amt,0);
    const expenseTotal = fyRows.filter(r=>r.type==='current').reduce((a,b)=>a+b.amt,0);
    const prepaidTotal = fyRows.filter(r=>r.type==='future').reduce((a,b)=>a+b.amt,0);

    output += `
    <div class="metrics-grid" role="region" aria-label="Accounting summary">
      <div class="metric-card"><div class="lbl">Prior Period Adj.</div><div class="val">${fmtINR(priorTotal)}</div></div>
      <div class="metric-card"><div class="lbl">Expense Header</div><div class="val">${fmtINR(expenseTotal)}</div></div>
      <div class="metric-card"><div class="lbl">Prepaid Adj.</div><div class="val">${fmtINR(prepaidTotal)}</div></div>
      <div class="metric-card"><div class="lbl">Classification Total</div><div class="val">${fmtINR(priorTotal+expenseTotal+prepaidTotal)}</div></div>
    </div>`;

    output += `<div class="section-title">&#128198; Financial Year Breakdown</div>`;
    output += `
    <div class="table-container">
      <table role="grid" aria-label="Financial year breakdown">
        <thead>
          <tr>
            <th scope="col">Financial Year</th>
            <th scope="col">Days</th>
            <th scope="col">Amount</th>
            <th scope="col">Accounting Treatment</th>
          </tr>
        </thead>
        <tbody>`;

    csvRows.push(['Financial Year', 'Days', 'Amount', 'Accounting Treatment']);

    for (const row of fyRows) {
      const rowCls  = 'row-' + row.type;
      const badge   = `<span class="badge badge-${row.type}">${row.type}</span>`;
      const treatment = row.type === 'prior' ? `${fmtINR(row.amt)} (Prior Period Adjustment)` : row.type === 'current' ? `${fmtINR(row.amt)} (Expense Header)` : `${fmtINR(row.amt)} (Prepaid Adjustment)`;

      output += `
          <tr class="${rowCls}" tabindex="0" aria-label="${row.label}, ${row.days} days, ${fmtINR(row.amt)}">
            <td>${row.label}${badge}</td>
            <td>${row.days}</td>
            <td>${fmtINR(row.amt)}</td>
            <td>${treatment}</td>
          </tr>`;

      csvRows.push([row.label, row.days, row.amt.toFixed(2), treatment]);
    }

    output += `</tbody></table></div>`;

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let mCursor  = new Date(startDate.getFullYear(), startDate.getMonth(), 1);

    output += `<div class="section-title">&#128197; Month-wise Breakdown</div>`;
    output += `
    <div class="table-container">
      <table role="grid" aria-label="Month-wise breakdown">
        <thead>
          <tr>
            <th scope="col">Month</th>
            <th scope="col">Year</th>
            <th scope="col">Days</th>
            <th scope="col">Amount</th>
          </tr>
        </thead>
        <tbody>`;

    csvRows.push([]);
    csvRows.push(['Month', 'Year', 'Days', 'Amount']);

    while (mCursor <= endDate) {
      const mStart = new Date(mCursor.getFullYear(), mCursor.getMonth(), 1);
      const mEnd   = new Date(mCursor.getFullYear(), mCursor.getMonth() + 1, 0);
      const aStart = startDate > mStart ? startDate : mStart;
      const aEnd   = endDate   < mEnd   ? endDate   : mEnd;

      if (aStart <= aEnd) {
        const days = Math.floor((aEnd - aStart) / MS_PER_DAY) + 1;
        const amt  = days * oneDayAmt;
        const mo   = MONTHS[mCursor.getMonth()];
        const yr   = mCursor.getFullYear();

        output += `
          <tr tabindex="0" aria-label="${mo} ${yr}, ${days} days, ${fmtINR(amt)}">
            <td>${mo}</td>
            <td>${yr}</td>
            <td>${days}</td>
            <td>${fmtINR(amt)}</td>
          </tr>`;

        csvRows.push([mo, yr, days, amt.toFixed(2)]);
      }
      mCursor.setMonth(mCursor.getMonth() + 1);
    }

    output += `</tbody></table></div>`;
    resultDiv.innerHTML = output;
    resultDiv.focus();
  }

  function downloadCSV() {
    if (csvRows.length === 0) {
      alert('Please calculate first before downloading.');
      return;
    }
    const content = csvRows.map(r => r.map(escapeCsv).join(',')).join('\n');
    const blob    = new Blob([content], { type: 'text/csv;charset=utf-8;' });
    const url     = URL.createObjectURL(blob);
    const link    = document.createElement('a');
    link.href     = url;
    link.download = 'prorata_breakdown.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }
</script>

<footer style="text-align: center; padding: 20px; color: #666; font-size: 0.8rem;">
    <p>&copy; 2026 HS. All rights reserved.</p>
    <p>Version: <span id="app-version">1.3.0</span></p>
</footer>
</body>
</html>
