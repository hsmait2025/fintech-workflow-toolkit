<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Bill Calculator with Bill Split</title>
<style>
*, *::before, *::after {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #bbbbbb;
    /* Uses fluid padding that scales down gracefully on small displays */
    padding: clamp(12px, 3vw, 24px);
    margin: 0;
}

.container {
    max-width: 650px;
    margin: auto;
    background: #fbfbfb;
    padding: clamp(16px, 4vw, 25px);
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
}

h2, h3 {
    text-align: center;
    color: #222;
}

h2 { font-size: clamp(20px, 5vw, 24px); }
h3 { font-size: clamp(16px, 4.5vw, 18px); margin-top: 24px; }

.item-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
}

input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    background: #fff;
    min-height: 44px; /* Mobile tap friendly */
    appearance: textfield;
    -moz-appearance: textfield;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

button {
    min-height: 44px; /* Optimized mobile action footprint */
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
}

.add-btn {
    background: #28a745;
    color: #fff;
    width: 100%; /* Spans full layout width on phone layouts */
    margin-bottom: 16px;
}
.add-btn:hover { background: #218838; }

.delete-btn {
    background: #dc3545;
    color: #fff;
    white-space: nowrap;
}
.delete-btn:hover { background: #c82333; }

.label {
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: bold;
    font-size: 14px;
    color: #444;
}

.summary-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    font-size: 15px;
}

.grand-total {
    font-size: clamp(18px, 4.5vw, 22px);
    font-weight: bold;
    color: #0d6efd;
    border-bottom: 2px solid #0d6efd;
}

/* Scroll-wrapper isolates extensive text tables on tight viewports */
.table-container {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 500px; /* Forces stable column sizing during micro-scrolls */
}

th, td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

th {
    background: #f2f2f2;
    font-weight: bold;
    color: #333;
}

tr:last-child td {
    border-bottom: none;
}

@media(max-width: 480px) {
    .item-row {
        gap: 6px;
    }
    .delete-btn {
        padding: 10px 12px; /* Scales padding back slightly to favor field input view */
    }
}
</style>
</head>
<body>

<div class="container">
<h2>Bill Splitter</h2>

<div id="itemContainer">
<div class="item-row">
<input type="text" class="itemAmount" placeholder="Enter Item Amount Before GST (e.g. 350+250)">
<button class="delete-btn" onclick="deleteRow(this)">Delete</button>
</div>
</div>

<button class="add-btn" onclick="addRow()">+ Add Item</button>

<div class="label">Freight Charges</div>
<input type="text" id="freight" placeholder="e.g. 500+100">

<div class="label">GST (%)</div>
<input type="text" id="gst" placeholder="e.g. 18">

<div style="margin-top:20px">
<div class="summary-row"><span>Items Total</span><span id="itemsTotal">₹0.00</span></div>
<div class="summary-row"><span>Freight</span><span id="freightTotal">₹0.00</span></div>
<div class="summary-row"><span>Taxable Amount</span><span id="taxableAmount">₹0.00</span></div>
<div class="summary-row"><span>GST Amount</span><span id="gstAmount">₹0.00</span></div>
<div class="summary-row grand-total"><span>Grand Total</span><span id="grandTotal">₹0.00</span></div>
</div>

<h3>Bill Split Details</h3>
<div class="table-container">
    <table id="splitTable">
    <thead>
    <tr>
    <th>Item No.</th>
    <th>Item Amount</th>
    <th>Freight Share</th>
    <th>Taxable Value</th>
    <th>GST Amount</th>
    <th>Total Amount</th>
    </tr>
    </thead>
    <tbody></tbody>
    </table>
</div>

</div>

<script>
function getValue(v){
 if(!v || v.trim()==='') return 0;
 try{
   v=v.replace(/[^0-9+\-*/().]/g,'');
   return Number(Function('"use strict";return ('+v+')')())||0;
 }catch{
   return 0;
 }
}

function addRow(){
 let row=document.createElement('div');
 row.className='item-row';
 row.innerHTML=`
 <input type="text" class="itemAmount" placeholder="Enter Item Amount Before GST (e.g. 350+250)">
 <button class="delete-btn" onclick="deleteRow(this)">Delete</button>`;
 document.getElementById('itemContainer').appendChild(row);
 attachEvents();
}

function deleteRow(btn){
 let rows=document.querySelectorAll('.item-row');
 if(rows.length>1){
   btn.parentElement.remove();
   calculateTotal();
 }
}

function generateSplitTable(){
 let freight=getValue(document.getElementById('freight').value);
 let gst=getValue(document.getElementById('gst').value);

 let items=Array.from(document.querySelectorAll('.itemAmount'))
 .map(i=>getValue(i.value))
 .filter(v=>v>0);

 let tbody=document.querySelector('#splitTable tbody');
 tbody.innerHTML='';

 if(items.length===0) return;

 let freightShare=freight/items.length;

 items.forEach((amount,index)=>{
   let taxable=amount+freightShare;
   let gstAmt=taxable*gst/100;
   let total=taxable+gstAmt;

   tbody.innerHTML+=`
   <tr>
   <td>${index+1}</td>
   <td>₹${amount.toFixed(2)}</td>
   <td>₹${freightShare.toFixed(2)}</td>
   <td>₹${taxable.toFixed(2)}</td>
   <td>₹${gstAmt.toFixed(2)}</td>
   <td>₹${total.toFixed(2)}</td>
   </tr>`;
 });
}

function calculateTotal(){
 let itemTotal=0;

 document.querySelectorAll('.itemAmount').forEach(input=>{
   itemTotal+=getValue(input.value);
 });

 let freight=getValue(document.getElementById('freight').value);
 let gst=getValue(document.getElementById('gst').value);

 let taxable=itemTotal+freight;
 let gstAmt=taxable*gst/100;
 let grandTotal=taxable+gstAmt;

 document.getElementById('itemsTotal').innerText='₹'+itemTotal.toFixed(2);
 document.getElementById('freightTotal').innerText='₹'+freight.toFixed(2);
 document.getElementById('taxableAmount').innerText='₹'+taxable.toFixed(2);
 document.getElementById('gstAmount').innerText='₹'+gstAmt.toFixed(2);
 document.getElementById('grandTotal').innerText='₹'+grandTotal.toFixed(2);

 generateSplitTable();
}

function attachEvents(){
 document.querySelectorAll('input').forEach(i=>{
   i.oninput=calculateTotal;
 });
}

document.addEventListener('keydown',function(e){
 if(e.key!=='Enter') return;

 let inputs=Array.from(document.querySelectorAll('input'));
 let current=document.activeElement;
 let idx=inputs.indexOf(current);

 if(idx>-1){
   e.preventDefault();
   let next=inputs[idx+1];
   if(next){
     next.focus();
     next.select();
   }
 }
});

attachEvents();
calculateTotal();
</script>
</body>
</html>
